name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: python -m pip install -r backend/requirements.txt
      - name: Run tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Install deps
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: yarn lint

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/diana-web/package-lock.json
      - name: Install deps
        working-directory: apps/diana-web
        run: npm ci
      - name: Build
        working-directory: apps/diana-web
        run: npm run build

